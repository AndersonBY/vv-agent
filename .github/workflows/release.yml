name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing release tag to publish (for example v0.1.39)"
        required: true
        type: string
      source_ref:
        description: "Git ref to build from when manually dispatching"
        required: false
        default: "main"
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    env:
      UV_NO_SOURCES: "1"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.source_ref || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync --dev --extra s3

      - name: Run tests
        run: uv run pytest

      - name: Run linting
        run: uv run ruff check .

      - name: Run type check
        run: uv run ty check

      - name: Build package
        shell: bash
        run: |
          rm -rf dist
          uv build

      - name: Generate release notes
        id: changelog
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}
          SOURCE_REF: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.source_ref || github.sha }}
        run: |
          VERSION="${RELEASE_TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          PREVIOUS_TAG=$(git tag --sort=-v:refname | grep -v "^${RELEASE_TAG}$" | head -n 1 || true)

          {
            echo "changelog<<EOF"
            if [ -n "$PREVIOUS_TAG" ]; then
              echo "## Changes since $PREVIOUS_TAG"
              git log --pretty=format:"- %s (%h)" "${PREVIOUS_TAG}..${SOURCE_REF}"
            else
              echo "- Initial release"
            fi
            echo
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Collect release artifacts
        id: artifacts
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(dist/*.whl dist/*.tar.gz)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No release artifacts found in dist/" >&2
            exit 1
          fi
          {
            echo "files<<EOF"
            printf '%s\n' "${files[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}
          name: v${{ steps.changelog.outputs.version }}
          body: ${{ steps.changelog.outputs.changelog }}
          files: ${{ steps.artifacts.outputs.files }}
          draft: false
          prerelease: false

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
